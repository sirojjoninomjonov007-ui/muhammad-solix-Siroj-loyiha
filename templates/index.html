<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form">
            <h2>Xush kelibsiz!</h2>
            <p>Iltimos, ma'lumotlaringizni kiriting</p>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Foydalanuvchi nomi" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Parol" required>
            </div>
            
            <div class="options">
                <label><input type="checkbox"> Esda saqlash</label>
                <a href="#">Parolni unutdingizmi?</a>
            </div>
            
            <button type="submit" class="login-btn">Kirish</button>
            
            <div class="register-link">
                Hisobingiz yo'qmi? <a href="#">Ro'yxatdan o'ting</a>
            </div>
        </form>
    </div>
</body>
</html>
